<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الدعم | مطعم هواي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-10">

    <nav class="bg-white p-6 shadow-sm flex justify-between items-center mb-10">
        <a href="index.html" class="text-2xl font-black text-amber-500">هواي <span class="text-gray-800">Support</span></a>
        <a href="index.html" class="bg-gray-100 px-4 py-2 rounded-xl text-sm font-bold">إغلاق</a>
    </nav>

    <div class="container mx-auto px-4 max-w-3xl">
        <div class="bg-white rounded-3xl shadow-lg p-8">
            <h1 class="text-2xl font-black text-gray-800 mb-6">كيف يمكننا مساعدتك؟</h1>
            
            <form id="support-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-2 font-bold text-gray-600">الاسم</label>
                        <input type="text" id="support-name" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-amber-500" placeholder="اسمك">
                    </div>
                    <div>
                        <label class="block mb-2 font-bold text-gray-600">رقم الهاتف</label>
                        <input type="tel" id="support-phone" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-amber-500" placeholder="01xxxxxxxxx">
                    </div>
                </div>

                <div>
                    <label class="block mb-2 font-bold text-gray-600">نوع الرسالة</label>
                    <select id="msg-type" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-amber-500">
                        <option value="complaint">شكوى</option>
                        <option value="suggestion">اقتراح</option>
                        <option value="inquiry">استفسار عام</option>
                    </select>
                </div>

                <div>
                    <label class="block mb-2 font-bold text-gray-600">رسالتك</label>
                    <textarea id="support-msg" rows="5" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-amber-500" placeholder="اكتب تفاصيل استفسارك هنا..."></textarea>
                </div>

                <button type="submit" class="w-full bg-amber-500 text-white py-4 rounded-2xl font-black text-lg hover:bg-amber-600 transition shadow-xl">إرسال الرسالة</button>
            </form>
        </div>

        <div class="mt-12 text-center">
            <h3 class="text-xl font-bold text-gray-700 mb-6 underline decoration-amber-300">تواصل معنا مباشرة</h3>
            <div class="flex justify-center gap-8">
                <a href="https://facebook.com" class="text-blue-600 text-4xl hover:scale-110 transition"><i class="fab fa-facebook"></i></a>
                <a href="https://instagram.com" class="text-pink-600 text-4xl hover:scale-110 transition"><i class="fab fa-instagram"></i></a>
                <a href="tel:0123456789" class="text-green-600 text-4xl hover:scale-110 transition"><i class="fas fa-phone-square"></i></a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('support-form').onsubmit = (e) => {
            e.preventDefault();
            
            const message = {
                id: Date.now(),
                name: document.getElementById('support-name').value,
                phone: document.getElementById('support-phone').value,
                type: document.getElementById('msg-type').value,
                text: document.getElementById('support-msg').value,
                date: new Date().toLocaleDateString('ar-EG')
            };

            const messages = JSON.parse(localStorage.getItem('hawai_messages')) || [];
            messages.push(message);
            localStorage.setItem('hawai_messages', JSON.stringify(messages));

            alert('شكراً لتواصلك معنا. تم استلام رسالتك وسنرد عليك قريباً!');
            e.target.reset();
        };
    </script>
</body>
</html>
