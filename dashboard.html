<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawai Admin | اللوحة الشاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --amber: #f59e0b; --dark: #020617; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: #f8fafc; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        #admin-sidebar { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(30px); border-left: 1px solid rgba(245, 158, 11, 0.2); width: 280px; }
        #admin-sidebar.open { transform: translateX(0); }
        .sidebar-link { width: 100%; padding: 18px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: 0.3s; }
        .sidebar-link:hover { background: rgba(245, 158, 11, 0.1); color: var(--amber); }
        .hidden-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="refreshUI()">

    <nav class="glass-panel fixed top-0 w-full z-[100] px-6 py-4 flex justify-between items-center border-b border-amber-500/10">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-amber-500 text-2xl p-2 bg-white/5 rounded-xl"><i class="fas fa-bars"></i></button>
            <h1 class="text-lg font-black italic">لوحة تحكم <span class="text-amber-500">هواي</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="window.open('index.html')" class="text-[9px] font-black bg-white/5 border border-white/10 px-4 py-2 rounded-lg">الموقع</button>
            <button onclick="clearLedger()" class="text-[9px] font-black bg-red-500/10 text-red-500 px-4 py-2 rounded-lg border border-red-500/20">تصفير</button>
        </div>
    </nav>

    <div id="admin-sidebar" class="fixed top-0 right-0 h-screen z-[200] pt-24 shadow-2xl">
        <button onclick="toggleSidebar()" class="absolute top-6 left-6 text-gray-500 text-2xl">&times;</button>
        <div class="sidebar-link" onclick="showSection('dashboard')"><i class="fas fa-shopping-cart text-amber-500"></i> <b>الطلبات الحالية</b></div>
        <div class="sidebar-link" onclick="showSection('add-product')"><i class="fas fa-plus-circle text-amber-500"></i> <b>إضافة وجبة</b></div>
        <div class="sidebar-link" onclick="showSection('manage-menu')"><i class="fas fa-utensils text-amber-500"></i> <b>إدارة المنيو</b></div>
        <div class="sidebar-link" onclick="showSection('messages')"><i class="fas fa-envelope text-amber-500"></i> <b>الرسائل</b></div>
    </div>
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/70 z-[150] hidden" onclick="toggleSidebar()"></div>

    <main class="pt-28 pb-20 px-4 md:px-10 max-w-7xl mx-auto text-right">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-panel p-6 rounded-[2rem] border-r-4 border-amber-500 shadow-xl">
                <p class="text-[10px] text-gray-500 font-black uppercase mb-1">إجمالي المبيعات</p>
                <h2 id="stat-sales" class="text-3xl font-black text-white italic">0 ج.م</h2>
            </div>
            <div class="glass-panel p-6 rounded-[2rem] border-r-4 border-amber-500 shadow-xl">
                <p class="text-[10px] text-gray-500 font-black uppercase mb-1">الطلبات الكلية</p>
                <h2 id="stat-orders-count" class="text-3xl font-black text-white italic">0</h2>
            </div>
            <div class="glass-panel p-6 rounded-[2rem] border-r-4 border-amber-500 shadow-xl">
                <p class="text-[10px] text-gray-500 font-black uppercase mb-1">أصناف المنيو</p>
                <h2 id="stat-items-count" class="text-3xl font-black text-white italic">0</h2>
            </div>
        </div>

        <section id="section-dashboard" class="active-section">
            <h2 class="text-2xl font-black mb-8 italic"><i class="fas fa-bell text-amber-500 ml-2 animate-bounce text-sm"></i> الطلبات <span class="text-amber-500">الجديدة</span></h2>
            <div id="live-orders-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="section-add-product" class="hidden-section max-w-xl mx-auto">
            <div class="glass-panel p-8 rounded-[2.5rem] border border-amber-500/20 shadow-2xl">
                <h2 class="text-2xl font-black mb-8 italic">إضافة <span class="text-amber-500">وجبة</span></h2>
                <div class="space-y-5">
                    <input id="p-name" type="text" placeholder="اسم الوجبة" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 focus:border-amber-500 transition">
                    <input id="p-price" type="number" placeholder="السعر (ج.م)" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/10 focus:border-amber-500 transition">
                    <div class="bg-white/5 border-2 border-dashed border-white/10 p-6 rounded-2xl text-center">
                        <input id="p-file" type="file" accept="image/*" class="hidden" onchange="handleFile(this)">
                        <button onclick="document.getElementById('p-file').click()" class="text-xs font-bold text-amber-500 underline mb-2 italic">اختر صورة الوجبة من جهازك</button>
                        <p id="file-status" class="text-[9px] text-gray-500 uppercase">لم يتم اختيار صورة</p>
                        <img id="p-preview" class="hidden w-full h-32 object-cover mt-4 rounded-xl border border-amber-500/20">
                    </div>
                    <button onclick="saveProduct()" class="w-full bg-amber-500 text-dark py-5 rounded-2xl font-black text-lg hover:shadow-xl hover:shadow-amber-500/20 transition-all">حفظ الصنف الجديد</button>
                </div>
            </div>
        </section>

        <section id="section-manage-menu" class="hidden-section">
            <h2 class="text-2xl font-black mb-8 italic">إدارة <span class="text-amber-500">المنيو</span></h2>
            <div id="menu-manager-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section id="section-messages" class="hidden-section">
            <div class="text-center py-32 bg-white/5 rounded-[3rem] border border-white/5">
                <i class="fas fa-envelope-open text-amber-500 text-4xl mb-4 opacity-30"></i>
                <p class="text-gray-500 font-black text-xl italic uppercase tracking-widest">صندوق الرسائل فارغ</p>
            </div>
        </section>
    </main>

    <script>
        let currentImg = "";

        function toggleSidebar() {
            document.getElementById('admin-sidebar').classList.toggle('open');
            document.getElementById('sidebar-backdrop').classList.toggle('hidden');
        }

        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.className = 'hidden-section');
            document.getElementById('section-' + id).className = 'active-section';
            toggleSidebar();
            refreshUI();
        }

        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImg = e.target.result;
                document.getElementById('p-preview').src = currentImg;
                document.getElementById('p-preview').classList.remove('hidden');
                document.getElementById('file-status').innerText = "تم رفع الصورة بنجاح!";
            };
            reader.readAsDataURL(input.files[0]);
        }

        function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            if(!name || !price || !currentImg) return alert("يا هندسة كمل البيانات وارفع الصورة!");
            let ps = JSON.parse(localStorage.getItem('hawai_products')) || [];
            ps.push({name, price, image: currentImg});
            localStorage.setItem('hawai_products', JSON.stringify(ps));
            alert("الوجبة بقت جاهزة في المنيو!");
            showSection('manage-menu');
        }

        function refreshUI() {
            const orders = JSON.parse(localStorage.getItem('hawai_orders')) || [];
            const products = JSON.parse(localStorage.getItem('hawai_products')) || [];
            const ledger = JSON.parse(localStorage.getItem('hawai_ledger')) || { sales: 0, count: 0 };

            document.getElementById('stat-sales').innerText = ledger.sales + " ج.م";
            document.getElementById('stat-orders-count').innerText = ledger.count;
            document.getElementById('stat-items-count').innerText = products.length;

            const grid = document.getElementById('live-orders-grid');
            grid.innerHTML = orders.map((o, i) => `
                <div class="glass-panel p-6 rounded-[2rem] border-r-4 border-amber-500 space-y-4 shadow-xl">
                    <div class="flex justify-between items-center opacity-40 border-b border-white/5 pb-2 text-[9px] font-black italic">
                        <span>${o.type}</span> <span>${o.date}</span>
                    </div>
                    <h3 class="text-xl font-black italic text-white">${o.customer}</h3>
                    <p class="text-xs font-bold text-amber-500 italic"><i class="fas fa-phone ml-1"></i> ${o.phone}</p>
                    
                    ${o.type === 'توصيل' ? `
                        <div class="bg-blue-500/10 p-3 rounded-xl border border-blue-500/20 text-[10px] font-bold">
                            <p class="text-blue-400 mb-1 font-black italic underline">العنوان:</p>
                            <p class="text-white">${o.address || 'غير محدد'}</p>
                        </div>
                    ` : ''}

                    ${o.paymentInfo ? `
                        <div class="bg-amber-500/10 p-3 rounded-xl border border-amber-500/20 text-[10px] font-bold">
                            <p class="text-amber-500 mb-1 font-black italic underline tracking-widest">تأكيد المحفظة:</p>
                            <p class="text-white font-mono break-all">${o.paymentInfo}</p>
                        </div>
                    ` : ''}

                    <div class="bg-white/5 p-4 rounded-xl text-[11px] font-bold">
                        <p class="text-[9px] text-gray-500 mb-2 uppercase font-black italic">الوجبات:</p>
                        ${o.items.map(it => `<div class="flex justify-between mb-1"><span>${it.name}</span> <span class="text-amber-500">x${it.quantity}</span></div>`).join('')}
                    </div>

                    <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center text-amber-500 font-black border border-white/5 shadow-inner">
                        <span class="text-xs text-gray-500 font-bold">الإجمالي:</span>
                        <span class="text-lg">${o.total} ج.م</span>
                    </div>
                    <button onclick="archiveOrder(${i}, ${o.total})" class="w-full bg-amber-500 text-dark py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-amber-500/10">تجهيز وأرشفة</button>
                </div>
            `).join('');

            const menuGrid = document.getElementById('menu-manager-grid');
            menuGrid.innerHTML = products.map((p, i) => `
                <div class="glass-panel p-4 rounded-2xl flex flex-col items-center gap-3 text-center border-amber-500/5">
                    <img src="${p.image}" class="w-full h-24 rounded-xl object-cover border border-white/10 grayscale hover:grayscale-0 transition duration-500">
                    <div>
                        <h4 class="font-black text-white text-[10px] truncate w-full">${p.name}</h4>
                        <p class="text-amber-500 font-black text-[10px] mt-1">${p.price} ج.م</p>
                    </div>
                    <button onclick="deleteP(${i})" class="w-full bg-red-500/10 text-red-500 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition">حذف</button>
                </div>`).join('');
        }

        function archiveOrder(idx, total) {
            let os = JSON.parse(localStorage.getItem('hawai_orders'));
            let lg = JSON.parse(localStorage.getItem('hawai_ledger')) || { sales: 0, count: 0 };
            lg.sales += Number(total);
            lg.count += 1;
            os.splice(idx, 1);
            localStorage.setItem('hawai_ledger', JSON.stringify(lg));
            localStorage.setItem('hawai_orders', JSON.stringify(os));
            refreshUI();
        }

        function deleteP(i) {
            if(confirm("نمسح الصنف ده؟")) {
                let ps = JSON.parse(localStorage.getItem('hawai_products'));
                ps.splice(i, 1);
                localStorage.setItem('hawai_products', JSON.stringify(ps));
                refreshUI();
            }
        }

        function clearLedger() {
            if(confirm("تصفير كلي؟")) {
                localStorage.setItem('hawai_ledger', JSON.stringify({ sales: 0, count: 0 }));
                localStorage.setItem('hawai_orders', JSON.stringify([]));
                refreshUI();
            }
        }
    </script>
</body>
</html>
